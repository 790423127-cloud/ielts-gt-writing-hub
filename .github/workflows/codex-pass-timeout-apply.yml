name: Codex pass timeout apply

on:
  push:
    branches: [main]
    paths:
      - '.codex-pass-timeout-apply-trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply API-only patch
        env:
          PATCH_B64: 
        run: |
          python - <<'PY'
          import base64, os, pathlib, subprocess
          patch = base64.b64decode(os.environ['PATCH_B64']).decode('utf-8')
          pathlib.Path('/tmp/pass-timeout.patch').write_text(patch, encoding='utf-8')
          subprocess.run(['git', 'apply', '-p0', '--ignore-whitespace', '--recount', '/tmp/pass-timeout.patch'], check=True)
          PY
      - name: Syntax check
        run: node --check api/grade-ielts.js
      - name: Clean temporary files
        run: |
          rm -f .codex-pass-timeout-apply-trigger
          rm -f .github/workflows/codex-pass-timeout-apply.yml
      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add api/grade-ielts.js .github/workflows/codex-pass-timeout-apply.yml .codex-pass-timeout-apply-trigger
          git commit -m "Guard non-grading DeepSeek timeouts" || exit 0
          git push
