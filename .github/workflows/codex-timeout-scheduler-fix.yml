name: Codex timeout scheduler fix

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply timeout scheduler patch
        shell: bash
        run: |
          python - <<'PY'
          import base64
          from pathlib import Path
          data = ""
          Path('/tmp/api-timeout.patch').write_bytes(base64.b64decode(data))
          PY
          git apply /tmp/api-timeout.patch
      - name: Verify syntax
        run: node --check api/grade-ielts.js
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          rm -f .github/workflows/codex-timeout-scheduler-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/grade-ielts.js .github/workflows/codex-timeout-scheduler-fix.yml
          git commit -m "Fix DeepSeek timeout scheduling" || exit 0
          git push
