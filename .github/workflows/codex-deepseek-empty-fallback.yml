name: Codex DeepSeek empty response fallback patch
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-deepseek-empty-fallback.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Recover patch script
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/790423127-cloud/ielts-gt-writing-hub/ea95f862bbb8cd524935d54304c2ce0d9a33252b/.github/workflows/codex-deepseek-empty-fallback.yml" > /tmp/old-workflow.yml
          python3 - <<'PY'
          from pathlib import Path
          text = Path('/tmp/old-workflow.yml').read_text(encoding='utf-8')
          marker = "cat > /tmp/deepseek_empty_patch.py.b64 <<'B64'\n"
          start = text.index(marker) + len(marker)
          end = text.index('\nB64', start)
          Path('/tmp/deepseek_empty_patch.py.b64').write_text(text[start:end].strip() + '\n', encoding='utf-8')
          PY
          base64 -d /tmp/deepseek_empty_patch.py.b64 > /tmp/deepseek_empty_patch.py
      - name: Patch files and verify syntax
        run: |
          set -euo pipefail
          python3 /tmp/deepseek_empty_patch.py
          node --check api/grade-ielts.js
          node --check script.js
      - name: Commit DeepSeek fallback fix and remove workflow
        run: |
          set -euo pipefail
          rm .github/workflows/codex-deepseek-empty-fallback.yml
          git config user.name "codex"
          git config user.email "codex@users.noreply.github.com"
          git add api/grade-ielts.js style.css .github/workflows/codex-deepseek-empty-fallback.yml
          git commit -m "Fix DeepSeek empty response fallback"
          git push
