name: Codex translation follow-up patch

on:
  push:
    paths:
      - .github/workflows/codex-translation-followup.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply patch
        run: |
          curl -fsSL https://paste.rs/bJQbw -o /tmp/codex_translation_followup.py
          python3 /tmp/codex_translation_followup.py
          node --check script.js
          node --check api/grade-ielts.js
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/codex-translation-followup.yml
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add script.js api/grade-ielts.js .github/workflows/codex-translation-followup.yml
          git commit -m "Extend Chinese feedback toggles" || exit 0
          git push
