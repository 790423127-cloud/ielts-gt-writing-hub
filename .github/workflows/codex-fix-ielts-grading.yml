name: Codex IELTS grading calibration patch
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-fix-ielts-grading.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch files
        run: |
          cat > /tmp/patch_repo.py.b64 <<'B64'

B64
          python - <<'PY'
          import base64, pathlib
          code = base64.b64decode(pathlib.Path('/tmp/patch_repo.py.b64').read_text()).decode('utf-8')
          exec(code)
          PY
      - name: Verify syntax
        run: |
          node --check api/grade-ielts.js
          node --check script.js
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/codex-fix-ielts-grading.yml
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add api/grade-ielts.js script.js .github/workflows/codex-fix-ielts-grading.yml
          git commit -m 'Fix IELTS grading task calibration'
          git push