name: Codex IELTS grading calibration patch
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-fix-ielts-grading.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Recover embedded patch from previous workflow commit
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/790423127-cloud/ielts-gt-writing-hub/197a16f9a32a82c7c4aaa910e6ad596b77f42380/.github/workflows/codex-fix-ielts-grading.yml" > /tmp/old-workflow.yml
          python3 - <<'PY'
          from pathlib import Path
          text = Path('/tmp/old-workflow.yml').read_text(encoding='utf-8')
          marker = "cat > /tmp/patch_repo.py.b64 <<'B64'\n"
          start = text.index(marker) + len(marker)
          end = text.index('\nB64', start)
          Path('/tmp/patch_repo.py.b64').write_text(text[start:end].strip() + '\n', encoding='utf-8')
          PY
          base64 -d /tmp/patch_repo.py.b64 > /tmp/patch_repo.py
      - name: Patch files and verify syntax
        run: |
          set -euo pipefail
          python3 /tmp/patch_repo.py
          node --check api/grade-ielts.js
          node --check script.js
      - name: Commit calibrated grading fix and remove temporary workflow
        run: |
          set -euo pipefail
          rm .github/workflows/codex-fix-ielts-grading.yml
          git config user.name "codex"
          git config user.email "codex@users.noreply.github.com"
          git add api/grade-ielts.js script.js .github/workflows/codex-fix-ielts-grading.yml
          git commit -m "Fix IELTS grading task calibration"
          git push
