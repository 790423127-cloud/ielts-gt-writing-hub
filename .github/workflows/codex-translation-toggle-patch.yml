name: Codex translation toggle patch
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/codex-translation-toggle-patch.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply minimal translation toggle patch
        run: |
          set -euo pipefail
          curl -fsSL https://paste.rs/MwKpL -o work_patch_translation.py
          python3 work_patch_translation.py
          node --check script.js
          node --check api/grade-ielts.js
      - name: Commit patched files and remove temporary workflow
        run: |
          set -euo pipefail
          git config user.name "codex"
          git config user.email "codex@openai.com"
          rm -f .github/workflows/codex-translation-toggle-patch.yml work_patch_translation.py
          git add script.js style.css api/grade-ielts.js .github/workflows/codex-translation-toggle-patch.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add hidden Chinese feedback toggles"
            git push
          fi
