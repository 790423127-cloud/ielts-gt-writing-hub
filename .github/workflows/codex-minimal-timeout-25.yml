name: Codex minimal timeout constant patch

on:
  push:
    branches: [main]
    paths:
      - '.codex-minimal-timeout-25-trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch timeout constant only
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('api/grade-ielts.js')
          text = path.read_text(encoding='utf-8')
          old = 'Math.min(Number(process.env.AI_SINGLE_REQUEST_TIMEOUT_MS || process.env.AI_REQUEST_TIMEOUT_MS) || 30000, 30000)'
          new = 'Math.min(Number(process.env.AI_SINGLE_REQUEST_TIMEOUT_MS || process.env.AI_REQUEST_TIMEOUT_MS) || 25000, 30000)'
          if old not in text and new not in text:
              raise SystemExit('timeout constant target not found')
          text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Syntax check
        run: node --check api/grade-ielts.js
      - name: Clean temporary files
        run: |
          rm -f .codex-minimal-timeout-25-trigger
          rm -f .github/workflows/codex-minimal-timeout-25.yml
      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add api/grade-ielts.js .github/workflows/codex-minimal-timeout-25.yml .codex-minimal-timeout-25-trigger
          git commit -m "Set DeepSeek request timeout default" || exit 0
          git push
