name: Codex compact timeout patch

on:
  push:
    branches: [main]
    paths:
      - '.codex-compact-timeout-trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply compact timeout patch
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('api/grade-ielts.js')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('if (mode === "revision") return veryShort ? 5200 : 7600;\n  return veryShort ? 4200 : 6200;', 'if (mode === "revision") return veryShort ? 3200 : 7000;\n  return veryShort ? 2400 : 5000;'),
              ('async function callAiGradingPass({ apiKey, model, body, gradingMode, maxTokens, locale, deadline }) {', 'async function callAiGradingPass({ apiKey, model, body, gradingMode, maxTokens, locale, deadline, veryShort = false }) {'),
              ('systemPrompt: buildSystemPrompt(false, locale),\n    userPrompt: buildUserPrompt({ ...body, mode: gradingMode }, false, locale),', 'systemPrompt: buildSystemPrompt(veryShort, locale),\n    userPrompt: buildUserPrompt({ ...body, mode: gradingMode }, veryShort, locale),'),
              ('maxTokens: gradingMaxTokens,\n    locale,\n    deadline\n  });', 'maxTokens: gradingMaxTokens,\n    locale,\n    deadline,\n    veryShort\n  });'),
              ('maxTokens,\n        locale,\n        deadline\n      });', 'maxTokens,\n        locale,\n        deadline,\n        veryShort\n      });')
          ]
          for old, new in replacements:
              if old not in text and new not in text:
                  raise SystemExit(f'target not found: {old[:80]!r}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Syntax check
        run: node --check api/grade-ielts.js
      - name: Clean temporary files
        run: |
          rm -f .codex-compact-timeout-trigger
          rm -f .github/workflows/codex-compact-timeout-patch.yml
      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add api/grade-ielts.js .github/workflows/codex-compact-timeout-patch.yml .codex-compact-timeout-trigger
          git commit -m "Use compact grading path for very short essays" || exit 0
          git push
